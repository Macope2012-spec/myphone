<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min iPhone-Hemsida</title>
    <style>
        /* Här skriver vi designen (CSS) */
        
        body {
            background-color: #2c3e50; /* Mörkgrå bakgrund utanför mobilen */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Själva iPhone-skalet */
        .iphone {
            width: 375px;
            height: 812px;
            background-color: #000;
            border: 12px solid #333;
            border-radius: 40px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Kameran/flärpen (Notch) längst upp */
        .notch {
            width: 150px;
            height: 30px;
            background-color: #333;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* Skärmen inuti mobilen */
        .screen {
            flex: 1;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Bakgrundsbild/färg på skärmen */
            padding: 40px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Hemknappslinjen längst ner (som på nyare iPhones) */
        .home-bar {
            width: 120px;
            height: 5px;
            background-color: #333;
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Styling för ditt innehåll */
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 16px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background-color: #3498db;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="iphone">
        <div class="notch"></div>
        
        <div class="screen">
            <div class="app-icon"></div> <h1>Välkommen!</h1>
            <p>Den här hemsidan är designad för att se ut som en iPhone-skärm direkt i din webbläsare.</p>
        </div>

        <div class="home-bar"></div>
    </div>

</body>
</html>
