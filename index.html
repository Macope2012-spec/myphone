<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 2. SKÄRM-CONTAINERN --- */
        .iphone-screen {
            width: 100%;
            height: 100%;
            max-width: 390px;
            max-height: 844px; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0px 25px 60px rgba(0, 0, 0, 0.8);
            border-radius: 48px;
            transition: all 0.3s ease;
        }

        @media (max-width: 450px) {
            .iphone-screen {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0px;
                box-shadow: none;
            }
        }

        /* --- 3. STATUSFÄLT --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px 10px 28px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10;
            letter-spacing: -0.1px;
            pointer-events: none;
        }

        .status-left { font-size: 13px; }

        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* TÄCKNINGSSTAPLAR */
        .network-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 10px;
        }
        .network-bars span {
            width: 2px;
            background-color: #fff;
            border-radius: 0.5px;
        }
        .bar1 { height: 3px; }
        .bar2 { height: 5px; }
        .bar3 { height: 7px; }
        .bar4 { height: 10px; }

        /* iOS 26 BATTERI - DETALJERAT OCH PERFECT CENTRERAT */
        .battery-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .ios-battery {
            width: 25px;
            height: 13px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4.5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Startar fyllning från vänster */
            padding: 1px;
            position: relative;
        }

        .battery-fill {
            height: 100%;
            width: 88%; /* 88% laddat */
            background-color: #fff;
            border-radius: 2.5px;
            transition: width 0.3s ease;
        }

        .battery-percent-inside {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px; /* FIX: var 8px */
            font-weight: 800;
            color: #000; /* Svart text som kontrasterar mot den vita laddningen */
            mix-blend-mode: difference; /* Magisk iOS-effekt: inverterar färg om bakgrunden ändras */
            letter-spacing: -0.5px; /* FIX: var -0.3px */
            line-height: 1;
            transform: scale(1, 0.95); /* FIX: ny rad, klämmer siffran snyggt i höjd */
        }

        .battery-head {
            width: 1.5px;
            height: 4.5px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 0 1.5px 1.5px 0;
            margin-left: 1px;
        }

        /* --- 4. DYNAMIC ISLAND --- */
        .dynamic-island-container {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .dynamic-island {
            width: 125px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            padding: 0 14px;
            box-sizing: border-box;
        }

        .island-content {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            gap: 10px;
        }

        .island-lock {
            width: 13px;
            height: 13px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .lock-shackle { transition: transform 0.3s ease; transform-origin: 12px 9px; }

        .island-text {
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            width: 0;
            white-space: nowrap;
            transition: opacity 0.2s ease, width 0.2s ease;
        }

        .dynamic-island.expanded { width: 170px; height: 34px; }
        .dynamic-island.expanded .island-text { opacity: 1; width: auto; }
        .dynamic-island.unlocked .lock-shackle { transform: translateY(-2px) rotate(-15px); }

        .iphone-screen.is-unlocked .dynamic-island {
            width: 85px;
            padding: 0;
            justify-content: center;
        }
        .iphone-screen.is-unlocked .island-lock { display: none; }

        /* --- 5. LÅSSKÄRM --- */
        .lock-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('blackbakgrund.webp');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box; z-index: 8;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .lock-screen.unlocked-swipe { transform: translateY(-100%); }

        .lock-content {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px; flex-grow: 1;
        }

        .date { font-size: 21px; font-weight: 600; letter-spacing: -0.2px; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .clock {
            font-size: 82px; font-weight: 900; margin-top: -5px; letter-spacing: -4px; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.3); white-space: nowrap;
            transform: scale(1.3, 1.4); transform-origin: top center;
        }

        .bottom-container { padding: 20px 32px 40px 32px; display: flex; flex-direction: column; align-items: center; gap: 25px; }

        .quick-actions { width: 100%; display: flex; justify-content: space-between; box-sizing: border-box; }
        .action-button {
            width: 50px; height: 50px; background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: background 0.2s, transform 0.1s; border: none;
        }
        .action-button svg { width: 20px; height: 20px; fill: #fff; }
        .action-button:active { transform: scale(0.92); background: #ffffff; }
        .action-button:active svg { fill: #1c1c1e; }

        .swipe-area { width: 100%; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .swipe-text { font-size: 13px; font-weight: 500; letter-spacing: 0.5px; opacity: 0.8; animation: pulse 2s infinite; margin-bottom: 8px; }
        .home-bar { width: 130px; height: 5px; background-color: #fff; border-radius: 10px; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        /* --- 6. HEMSKÄRMEN --- */
        .home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('blackbakgrund.webp'); background-size: cover; background-position: center;
            z-index: 1; box-sizing: border-box; padding: 70px 25px 30px 25px; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px 16px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }

        /* IOS 26 SQUIRCLE-IKONER */
        .app-icon {
            width: 60px; height: 60px; border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; position: relative; overflow: hidden;
        }
        .app-icon svg { width: 100%; height: 100%; display: block; }
        .app-item:active .app-icon { transform: scale(0.9); }
        .app-label { font-size: 11px; font-weight: 500; margin-top: 6px; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .dock {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 30px; padding: 12px 16px; display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 15px;
        }
        .home-screen-indicator { width: 130px; height: 5px; background-color: #fff; border-radius: 10px; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="iphone-screen">
        
        <div class="status-bar">
            <span class="status-left">Telenor SE</span>
            <div class="status-right">
                <div class="network-bars">
                    <span class="bar1"></span><span class="bar2"></span><span class="bar3"></span><span class="bar4"></span>
                </div>
                <span style="font-size: 11px; font-weight: 800; margin-left: 2px; margin-right: 4px;">5G</span>
                
                <div class="battery-container">
                    <div class="ios-battery">
                        <div class="battery-fill"></div>
                        <span class="battery-percent-inside">88</span>
                    </div>
                    <div class="battery-head"></div>
                </div>
            </div>
        </div>

        <div class="dynamic-island-container">
            <div class="dynamic-island" id="island" onclick="handleIslandClick()">
                <div class="island-content">
                    <svg class="island-lock" viewBox="0 0 24 24">
                        <path class="lock-shackle" d="M7 10V7a5 5 0 0 1 10 0v3" />
                        <rect x="5" y="10" width="14" height="11" rx="3.5" fill="#fff" stroke="none" />
                    </svg>
                    <span class="island-text" id="islandText">Face ID</span>
                </div>
            </div>
        </div>

        <div class="lock-screen" id="lockScreen">
            <div class="lock-content">
                <div class="date" id="date">Onsdag 15 juli</div>
                <div class="clock" id="clock">12:00</div>
            </div>
            <div class="bottom-container">
                <div class="quick-actions">
                    <div class="action-button" id="flashlight">
                        <svg viewBox="0 0 24 24"><path d="M9 3h6c.6 0 1 .4 1 1v2H8V4c0-.6.4-1 1-1zm6.5 4.5L14 10v9.5c0 .8-.7 1.5-1.5 1.5h-1c-.8 0-1.5-.7-1.5-1.5V10L8.5 7.5h7zM12 11c-.6 0-1 .4-1 1v3c0 .6.4 1 1 1s1-.4 1-1v-3c0-.6-.4-1-1-1z"/></svg>
                    </div>
                    <div class="action-button" id="camera">
                        <svg viewBox="0 0 24 24"><path d="M8.5 5c-.3 0-.6.1-.8.4L7 7H4.5C3.1 7 2 8.1 2 9.5v9C2 19.9 3.1 21 4.5 21h15c1.4 0 2.5-1.1 2.5-2.5v-9C22 8.1 20.9 7 19.5 7H17l-.7-1.6c-.2-.3-.5-.4-.8-.4h-7zM12 18c-2.5 0-4.5-2-4.5-4.5S9.5 9 12 9s4.5 2 4.5 4.5S14.5 18 12 18zm0-1.5c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3 1.3 3 3 3z"/></svg>
                    </div>
                </div>
                <div class="swipe-area" onclick="swipeUpToHome()">
                    <div class="swipe-text">Svep uppåt för att öppna</div>
                    <div class="home-bar"></div>
                </div>
            </div>
        </div>

        <div class="home-screen">
            <div class="app-grid">
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#ffffff"/>
                            <circle cx="30" cy="30" r="26" fill="#007AFF"/>
                            <circle cx="30" cy="30" r="20" fill="#ffffff"/>
                            <path d="M37 23 L41 19 L33 27 Z" fill="#FF3B30"/>
                            <path d="M23 37 L19 41 L27 33 Z" fill="#8E8E93"/>
                        </svg>
                    </div>
                    <div class="app-label">Safari</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#ffffff"/>
                            <circle cx="30" cy="20" r="8" fill="#FF2D55" opacity="0.8"/>
                            <circle cx="40" cy="25" r="8" fill="#FF9500" opacity="0.8"/>
                            <circle cx="40" cy="35" r="8" fill="#4CD964" opacity="0.8"/>
                            <circle cx="30" cy="40" r="8" fill="#5AC8FA" opacity="0.8"/>
                            <circle cx="20" cy="35" r="8" fill="#007AFF" opacity="0.8"/>
                            <circle cx="20" cy="25" r="8" fill="#5856D6" opacity="0.8"/>
                        </svg>
                    </div>
                    <div class="app-label">Bilder</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#8E8E93"/>
                            <circle cx="30" cy="30" r="18" fill="#AEAEB2"/>
                            <circle cx="30" cy="30" r="10" fill="#8E8E93"/>
                            <path d="M30 8 L32 14 H28 Z M30 52 L32 46 H28 Z M8 30 L14 32 V28 Z M52 30 L46 32 V28 Z" fill="#AEAEB2"/>
                        </svg>
                    </div>
                    <div class="app-label">Inställningar</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#E5E5EA"/>
                            <path d="M0 20 L20 10 L40 20 L60 10 V60 L40 50 L20 60 L0 50 Z" fill="#4CD964" opacity="0.3"/>
                            <line x1="20" y1="10" x2="20" y2="60" stroke="#ffffff" stroke-width="2"/>
                            <line x1="40" y1="20" x2="40" y2="50" stroke="#ffffff" stroke-width="2"/>
                            <circle cx="30" cy="30" r="4" fill="#FF3B30"/>
                        </svg>
                    </div>
                    <div class="app-label">Kartor</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#34AADC"/>
                            <path d="M30 12 L48 44 H40 L30 26 L20 44 H12 Z" fill="#ffffff"/>
                        </svg>
                    </div>
                    <div class="app-label">App Store</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#007AFF"/>
                            <rect x="12" y="18" width="36" height="24" rx="4" fill="#ffffff"/>
                            <path d="M12 20 L30 32 L48 20" stroke="#007AFF" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div class="app-label">Mejl</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#ffffff"/>
                            <rect x="0" y="0" width="60" height="15" fill="#FFCC00"/>
                            <line x1="12" y1="26" x2="48" y2="26" stroke="#E5E5EA" stroke-width="2"/>
                            <line x1="12" y1="38" x2="48" y2="38" stroke="#E5E5EA" stroke-width="2"/>
                            <line x1="12" y1="50" x2="36" y2="50" stroke="#E5E5EA" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="app-label">Anteckningar</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#FF2D55"/>
                            <path d="M22 42 A5 5 0 1 1 17 37 L17 18 L42 14 L42 34 A5 5 0 1 1 37 29 L37 20 L22 23 Z" fill="#ffffff"/>
                        </svg>
                    </div>
                    <div class="app-label">Musik</div>
                </div>
            </div>

            <div>
                <div class="dock">
                    <div class="app-icon" style="width:50px; height:50px;">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#4CD964"/>

                        </svg>
                    </div>
                    <div class="app-icon" style="width:50px; height:50px;">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#5AC8FA"/>
                            <path d="M15 45 C15 30 45 30 45 45 Z" fill="#ffffff"/>
                            <circle cx="30" cy="22" r="7" fill="#ffffff"/>
                        </svg>
                    </div>
                    <div class="app-icon" style="width:50px; height:50px;">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#FF3B30"/>
                            <polygon points="22,18 44,30 22,42" fill="#ffffff"/>
                        </svg>
                    </div>
                    <div class="app-icon" style="width:50px; height:50px;">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#ffffff"/>
                            <circle cx="30" cy="30" r="16" fill="none" stroke="#1D1D1F" stroke-width="4"/>
                            <circle cx="30" cy="30" r="6" fill="#1D1D1F"/>
                        </svg>
                    </div>
                </div>
                <div class="home-screen-indicator"></div>
            </div>
        </div>

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('sv-SE', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('date').textContent = dateStr;
        }

        function swipeUpToHome() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.add('unlocked-swipe');
            screen.classList.add('is-unlocked');
        }

        function lockPhone() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.remove('unlocked-swipe');
            screen.classList.remove('is-unlocked');
        }

        let isAnimating = false;
        function handleIslandClick() {
            const screen = document.querySelector('.iphone-screen');
            if (screen.classList.contains('is-unlocked')) {
                lockPhone();
                return;
            }
            if (isAnimating) return;
            isAnimating = true;

            const island = document.getElementById('island');
            const islandText = document.getElementById('islandText');

            island.classList.add('expanded');
            islandText.textContent = "Face ID";

            setTimeout(() => {
                island.classList.add('unlocked');
                islandText.textContent = "Upplåst";
            }, 800);

            setTimeout(() => {
                island.classList.remove('expanded');
                setTimeout(() => {
                    island.classList.remove('unlocked');
                    isAnimating = false;
                    swipeUpToHome();
                }, 400);
            }, 2000);
        }

        let startY = 0;
        const lockScreenEl = document.getElementById('lockScreen');

        lockScreenEl.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });

        lockScreenEl.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) {
                swipeUpToHome();
            }
        }, { passive: true });

        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
