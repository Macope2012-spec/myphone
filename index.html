<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iOS 26 & 27 Simulator</title>
    <style>
        :root {
            --spring-io: cubic-bezier(0.16, 1, 0.3, 1);
            --liquid-glass: rgba(255, 255, 255, 0.11);
            --glass-border: rgba(255, 255, 255, 0.18);
            --siri-glow: radial-gradient(circle, rgba(100,80,250,0.8) 0%, rgba(255,80,150,0.8) 50%, rgba(0,240,255,0) 70%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #0d0e15;
            background-image: radial-gradient(circle at center, #1a1c29 0%, #0d0e15 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Titanium Ram */
        .iphone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 54px;
            box-shadow: 0 0 0 4px #3a3a3c, 0 30px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            padding: 10px;
        }

        /* Skärm */
        .iphone-screen {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=375&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 44px;
            overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            transition: all 0.5s var(--spring-io);
            cursor: pointer;
        }

        .dynamic-island:active {
            width: 130px;
            height: 35px;
        }

        /* Statusfält */
        .status-bar {
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
        }

        /* Låsskärm */
        .lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            background-size: cover;
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 70px 0 40px 0;
            transition: transform 0.6s var(--spring-io), opacity 0.4s ease, filter 0.4s ease;
        }

        .lock-screen.unlocked-swipe {
            transform: translateY(-100%);
            opacity: 0;
            filter: blur(15px);
            pointer-events: none;
        }

        #clock {
            font-size: 80px;
            font-weight: 800;
            letter-spacing: -2px;
            color: #fff;
            text-align: center;
        }

        #date {
            font-size: 19px;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            text-align: center;
        }

        /* Hemskärm med Liquid Glass design */
        .home-screen {
            padding: 15px 18px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            margin-top: 25px;
            opacity: 0;
            transform: scale(0.95);
            transition: transform 0.6s var(--spring-io), opacity 0.5s ease;
        }

        .is-unlocked .home-screen {
            opacity: 1;
            transform: scale(1);
        }

        /* Liquid Glass Widget */
        .glass-widget {
            background: var(--liquid-glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 16px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 14px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* App-ikoner med glas-effekt */
        .app-icon {
            width: 62px;
            height: 62px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: transform 0.2s var(--spring-io);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .app-item:active .app-icon {
            transform: scale(0.88);
        }

        .app-label {
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            margin-top: 7px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Docka */
        .dock-container {
            padding: 0 18px 20px 18px;
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.6s var(--spring-io), opacity 0.5s ease;
        }

        .is-unlocked .dock-container {
            opacity: 1;
            transform: translateY(0);
        }

        .dock {
            background: var(--liquid-glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 32px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .dock .app-icon {
            width: 56px;
            height: 56px;
        }

        .home-screen-indicator {
            width: 130px;
            height: 5px;
            background: rgba(255,255,255,0.7);
            border-radius: 3px;
            margin: 15px auto 0 auto;
        }

        /* Fullskärmsappar */
        .app-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0c0d14;
            z-index: 1000;
            display: none;
            flex-direction: column;
            border-radius: 44px;
        }

        .app-screen.open { display: flex; }

        .app-header {
            padding: 55px 24px 15px 24px;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .app-body {
            flex: 1;
            padding: 20px;
            color: #fff;
            overflow-y: auto;
        }

        .app-close-zone {
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .home-bar {
            width: 130px;
            height: 5px;
            background: #fff;
            border-radius: 3px;
        }

        /* Siri AI i iOS 27-stil */
        .siri-panel {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 320px;
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 35px 35px 44px 44px;
            z-index: 9999;
            transition: bottom 0.5s var(--spring-io);
            padding: 25px;
            box-sizing: border-box;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .siri-panel.active {
            bottom: 0;
        }

        .siri-orb-container {
            width: 100%;
            height: 100px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .siri-orb {
            width: 140px;
            height: 140px;
            background: var(--siri-glow);
            filter: blur(10px);
            animation: pulse-siri 2s infinite ease-in-out;
            border-radius: 50%;
        }

        @keyframes pulse-siri {
            0%, 100% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* iOS 27 Beta knapp */
        .beta-banner {
            background: linear-gradient(135deg, #2f1c5c, #000);
            border: 1.5px solid #8e2de2;
            padding: 15px;
            border-radius: 18px;
            margin-top: 15px;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island" onclick="toggleSiri()"></div>
        
        <div class="iphone-screen">
            <div class="status-bar">
                <span id="time-widget">12:00</span>
                <div style="display:flex; gap:6px;">
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <div class="lock-screen" id="lockScreen" onclick="unlockPhone()">
                <div>
                    <div id="date">Torsdag 16 juli</div>
                    <div id="clock">12:00</div>
                </div>
                <div style="text-align:center; color:rgba(255,255,255,0.6); font-size:14px; animation: bounce 2s infinite;">
                    Svep upp eller klicka för att låsa upp
                </div>
            </div>

            <div class="home-screen">
                <div class="glass-widget">
                    <div style="font-size:12px; text-transform:uppercase; opacity:0.6; letter-spacing:1px;">Apple Intelligence</div>
                    <div style="font-size:18px; font-weight:700; margin-top:4px;">iOS 26.5 är aktivt</div>
                    <div style="font-size:13px; opacity:0.8; margin-top:4px;">Klicka på Dynamic Island för att starta Siri AI.</div>
                </div>

                <div class="app-grid">
                    <div class="app-item" onclick="openApp('safari')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #00c6ff, #0072ff);">🌐</div>
                        <div class="app-label">Safari</div>
                    </div>
                    <div class="app-item" onclick="openApp('settings')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #4b5563, #1f2937);">⚙️</div>
                        <div class="app-label">Inställningar</div>
                    </div>
                    <div class="app-item" onclick="openApp('photos')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #ff5e62, #ff9966);">🖼️</div>
                        <div class="app-label">Bilder</div>
                    </div>
                </div>
            </div>

            <div class="dock-container">
                <div class="dock">
                    <div class="app-icon" style="background: linear-gradient(135deg, #11998e, #38ef7d);">📞</div>
                    <div class="app-icon" style="background: linear-gradient(135deg, #ea00d9, #711c91);">🎵</div>
                </div>
                <div class="home-screen-indicator"></div>
            </div>

            <div class="siri-panel" id="siriPanel">
                <div style="text-align:center;">
                    <h3 style="font-size:18px; font-weight:700;" id="siriText">Hur kan jag hjälpa dig idag?</h3>
                    <p style="font-size:12px; opacity:0.5; margin-top:4px;">Drivs av Siri AI (iOS 27)</p>
                </div>
                <div class="siri-orb-container">
                    <div class="siri-orb"></div>
                </div>
                <button onclick="siriRespond()" style="width:100%; padding:12px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); border-radius:15px; color:#fff; font-weight:600; cursor:pointer;">Prata med Siri</button>
            </div>
        </div>

        <div class="app-screen" id="appScreen">
            <div class="app-header" id="appTitle">App</div>
            <div class="app-body" id="appBody">Innehåll</div>
            <div class="app-close-zone" onclick="closeApp()">
                <div class="home-bar"></div>
            </div>
        </div>
    </div>

    <script>
        // Klocka
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}`;
            document.getElementById('time-widget').textContent = `${h}:${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Lås upp
        function unlockPhone() {
            document.getElementById('lockScreen').classList.add('unlocked-swipe');
            document.querySelector('.iphone-screen').classList.add('is-unlocked');
        }

        // Öppna appar
        const appContents = {
            safari: {
                title: 'Safari 26',
                body: `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px;">
                    <h3>Sök med AI-sammanfattning</h3>
                    <p style="font-size:14px; opacity:0.7; margin-top:8px;">Webbsidor sammanfattas automatiskt i iOS 26 med lokala språkmodeller.</p>
                </div>`
            },
            settings: {
                title: 'Inställningar',
                body: `
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <div>Programuppdatering</div>
                        <div class="beta-banner" onclick="simulateBetaUpdate()">
                            <h4 style="font-weight:700;">iOS 27 Public Beta</h4>
                            <p style="font-size:12px; opacity:0.8; margin-top:4px;">Uppgradera och testa Siri AI och nya Liquid Glass-effekter.</p>
                        </div>
                    </div>
                `
            },
            photos: {
                title: 'Bilder (Clean Up)',
                body: `<p style="font-size:14px; opacity:0.8;">Bilder-appen använder nu avancerad lokal AI för att sortera och söka på dina bilder direkt i enheten.</p>`
            }
        };

        function openApp(appId) {
            const app = appContents[appId];
            if(!app) return;
            document.getElementById('appTitle').textContent = app.title;
            document.getElementById('appBody').innerHTML = app.body;
            document.getElementById('appScreen').classList.add('open');
        }

        function closeApp() {
            document.getElementById('appScreen').classList.remove('open');
        }

        // Siri AI-kontroll
        function toggleSiri() {
            const siri = document.getElementById('siriPanel');
            siri.classList.toggle('active');
            if (siri.classList.contains('active')) {
                document.getElementById('siriText').textContent = "Lyssnar...";
            }
        }

        function siriRespond() {
            const responses = [
                "Jag har optimerat ditt batteri med de nya iOS 27-algoritmerna.",
                "Söker efter uppdateringar för dina installerade appar...",
                "Skapar en sammanfattning av din dag.",
                "Vill du att jag ska aktivera det nya Liquid Glass-temat?"
            ];
            document.getElementById('siriText').textContent = responses[Math.floor(Math.random() * responses.length)];
        }

        function simulateBetaUpdate() {
            alert("Söker efter iOS 27 Public Beta... Enheten startas om med nya funktioner!");
            closeApp();
            document.getElementById('lockScreen').classList.remove('unlocked-swipe');
            document.querySelector('.iphone-screen').classList.remove('is-unlocked');
        }
    </script>
</body>
</html>
