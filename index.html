<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. SKÄRM-CONTAINERN --- */
        .iphone-screen {
            width: 100%;
            height: 100%;
            max-width: 390px;
            max-height: 844px; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0px 25px 60px rgba(0, 0, 0, 0.8);
            border-radius: 48px;
            transition: all 0.3s ease;
        }

        @media (max-width: 450px) {
            .iphone-screen {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0px;
                box-shadow: none;
            }
        }

        /* --- 3. STATUSFÄLT --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px 10px 28px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10;
            letter-spacing: -0.1px;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
        }

        .status-left { font-size: 14px; font-weight: 600; }

        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* TÄCKNINGSSTAPLAR */
        .network-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 10px;
        }
        .network-bars span {
            width: 2px;
            background-color: #fff;
            border-radius: 0.5px;
        }
        .bar1 { height: 3px; }
        .bar2 { height: 5px; }
        .bar3 { height: 7px; }
        .bar4 { height: 10px; }

        .wifi-icon {
            width: 15px;
            height: 11px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* iOS-BATTERI */
        .battery-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .ios-battery {
            width: 25px;
            height: 13px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4.5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 1px;
            position: relative;
        }

        .battery-fill {
            height: 100%;
            width: 88%;
            background-color: #fff;
            border-radius: 2.5px;
            transition: width 0.3s ease;
        }

        .battery-percent-inside {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            font-weight: 800;
            color: #000;
            mix-blend-mode: difference;
            letter-spacing: -0.5px;
            line-height: 1;
            transform: scale(1, 0.95);
        }

        .battery-head {
            width: 1.5px;
            height: 4.5px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 0 1.5px 1.5px 0;
            margin-left: 1px;
        }

        /* --- 4. DYNAMIC ISLAND --- */
        .dynamic-island-container {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
        }

        .dynamic-island {
            width: 120px;
            height: 36px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 35%), #000;
            border: 0.5px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.45), inset 0 0.5px 0 rgba(255,255,255,0.12);
        }

        /* --- 4b. FACE ID-INDIKATOR --- */
        .faceid-indicator {
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translateX(-50%) scale(0.7);
            z-index: 90;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        .faceid-indicator.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .faceid-lock {
            width: 26px; height: 26px;
            fill: none; stroke: #fff; stroke-width: 2.2;
            stroke-linecap: round; stroke-linejoin: round;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.45));
        }
        .faceid-shackle { transition: transform 0.3s ease; transform-origin: 12px 9px; }
        .faceid-indicator.unlocked .faceid-shackle { transform: translateY(-2px) rotate(-15deg); }

        /* --- 5. LÅSSKÄRM --- */
        .lock-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('blackbakgrund.webp');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box; z-index: 8;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .lock-screen.unlocked-swipe { transform: translateY(-100%); }

        .lock-content {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px; flex-grow: 1;
            cursor: pointer;
        }

        .date {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .clock {
            font-size: 80px;
            font-weight: 700;
            margin-top: -2px;
            letter-spacing: -2px;
            text-shadow: 0 4px 18px rgba(0,0,0,0.4);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .bottom-container { padding: 20px 32px 40px 32px; display: flex; flex-direction: column; align-items: center; gap: 25px; }

        .quick-actions { width: 100%; display: flex; justify-content: space-between; box-sizing: border-box; }
        .action-button {
            width: 50px; height: 50px;
            background: linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 60%), rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border: 0.5px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25), inset 0 0.5px 0 rgba(255,255,255,0.3);
        }
        .action-button svg { width: 20px; height: 20px; fill: #fff; }
        .action-button:active { transform: scale(0.92); background: #ffffff; }
        .action-button:active svg { fill: #1c1c1e; }

        .swipe-area { width: 100%; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .swipe-text { font-size: 13px; font-weight: 500; letter-spacing: 0.3px; opacity: 0.85; animation: pulse 2s infinite; margin-bottom: 8px; }
        .home-bar { width: 134px; height: 5px; background-color: #fff; border-radius: 10px; opacity: 0.95; }

        @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.95; } }

        /* --- 6. HEMSKÄRMEN --- */
        .home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('blackbakgrund.webp'); background-size: cover; background-position: center;
            z-index: 1; box-sizing: border-box; padding: 70px 25px 30px 25px; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px 16px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }

        /* DETALJERAD SQUIRCLE-DESIGN FÖR APPLE IKONER */
        .app-icon {
            width: 60px; height: 60px; 
            border-radius: 13.5px; /* Perfekt iOS Squircle-förhållande */
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; position: relative; overflow: hidden;
        }
        
        /* Premium reflektionslager över ikonerna */
        .app-icon::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        
        .app-icon svg { width: 100%; height: 100%; display: block; }
        .app-item:active .app-icon { transform: scale(0.9); }
        .app-label { font-size: 11px; font-weight: 500; margin-top: 6px; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .dock {
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%), rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(35px) saturate(1.5);
            -webkit-backdrop-filter: blur(35px) saturate(1.5);
            border: 0.5px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 0.5px 0 rgba(255,255,255,0.4);
            margin-bottom: 15px;
        }
        .home-screen-indicator { width: 134px; height: 5px; background-color: #fff; border-radius: 10px; margin: 0 auto; opacity: 0.95; }
    </style>
</head>

                        <svg viewBox="0 0 60 60">
                            <defs>
                                <linearGradient id="youtubeBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF4B4B"/><stop offset="100%" stop-color="#D32F2F"/></linearGradient>
                            </defs>
                            <rect width="60" height="60" fill="url(#youtubeBg)"/>
                            <polygon points="23,17 43,30 23,43" fill="#ffffff"/>
                        </svg>
                    </div>

                    <div class="app-icon" style="width:50px; height:50px;">
                        <svg viewBox="0 0 60 60">
                            <defs>
                                <linearGradient id="cameraBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E5E5EA"/><stop offset="100%" stop-color="#999999"/></linearGradient>
                            </defs>
                            <rect width="60" height="60" fill="url(#cameraBg)"/>
                            <rect x="12" y="20" width="36" height="26" rx="5" fill="#424242"/>
                            <path d="M22 20 L25 15 L35 15 L38 20 Z" fill="#424242"/>
                            <circle cx="30" cy="33" r="8" fill="#FFFFFF" opacity="0.3"/>
                            <circle cx="30" cy="33" r="6" fill="#1A1A1A"/>
                            <circle cx="43" cy="25" r="1.5" fill="#FFCC00"/> </svg>
                    </div>

                </div>
                <div class="home-screen-indicator"></div>
            </div>
        </div>

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            const timeStr = `${hours}:${minutes}`;
            document.getElementById('clock').textContent = timeStr;

            const isUnlocked = document.querySelector('.iphone-screen').classList.contains('is-unlocked');
            document.getElementById('statusLeft').textContent = isUnlocked ? timeStr : 'Telenor SE';

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('sv-SE', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('date').textContent = dateStr;
        }

        function swipeUpToHome() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.add('unlocked-swipe');
            screen.classList.add('is-unlocked');
            updateTime();
        }

        function lockPhone() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.remove('unlocked-swipe');
            screen.classList.remove('is-unlocked');
            updateTime();
        }

        let faceIdBusy = false;
        function simulateFaceID() {
            const screen = document.querySelector('.iphone-screen');
            if (screen.classList.contains('is-unlocked') || faceIdBusy) return;
            faceIdBusy = true;

            const indicator = document.getElementById('faceIdIndicator');
            indicator.classList.add('show');

            setTimeout(() => {
                indicator.classList.add('unlocked');
            }, 500);

            setTimeout(() => {
                indicator.classList.remove('show');
                setTimeout(() => {
                    indicator.classList.remove('unlocked');
                    faceIdBusy = false;
                }, 300);
            }, 1600);
        }

        let startY = 0;
        const lockScreenEl = document.getElementById('lockScreen');

        lockScreenEl.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });

        lockScreenEl.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) {
                swipeUpToHome();
            }
        }, { passive: true });

        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
