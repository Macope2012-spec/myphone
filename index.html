<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS 18 Private Chat</title>
    <style>
        :root {
            --ios-spring-in: cubic-bezier(0.16, 1, 0.3, 1);
            --ios-spring-out: cubic-bezier(0.25, 1, 0.5, 1);
            --ios-island-spring: cubic-bezier(0.175, 0.885, 0.32, 1.2);
            
            --blur-glass: rgba(120, 120, 128, 0.2);
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-dark-gray: #1c1c1e;
            --ios-light-gray: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #08080a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        /* IPHONE 16 PRO MAX RAM */
        .iphone-frame {
            width: 390px;
            height: 844px;
            background: #151516;
            border-radius: 58px;
            box-shadow: 
                inset 0 0 4px 2px rgba(255, 255, 255, 0.12),
                inset 0 0 0 7px #050507,
                0 25px 90px rgba(0, 0, 0, 0.9);
            position: relative;
            padding: 14px;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 45px;
            overflow: hidden;
        }

        .wallpaper-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000 url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* DYNAMIC ISLAND */
        .dynamic-island-container {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translate3d(-50%, 0, 0);
            z-index: 99999;
        }
        .dynamic-island {
            width: 115px; 
            height: 30px; 
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Statusfält */
        .status-bar {
            height: 48px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 28px; color: #fff; font-size: 13.5px; font-weight: 600; z-index: 1000;
        }

        /* Hemskärm */
        .home-screen {
            padding: 25px 18px 10px 18px; display: flex; flex-direction: column; flex-grow: 1;
        }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px 14px; padding-top: 20px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        .app-icon {
            width: 60px; height: 60px; border-radius: 22%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.35);
            transition: transform 0.2s;
        }
        .app-item:active .app-icon { transform: scale3d(0.85, 0.85, 1); }

        .icon-messages { background: linear-gradient(180deg, #5fe46e 0%, #2bd04a 100%); }
        .message-bubble { width: 34px; height: 24px; background: #fff; border-radius: 12px; position: relative; }
        .message-bubble::after { content: ''; position: absolute; bottom: -2px; left: -3px; width: 11px; height: 11px; background: #fff; border-bottom-right-radius: 9px; border-bottom-left-radius: 14px; transform: rotate(-10deg); }
        .app-label { color: #fff; font-size: 11.5px; font-weight: 500; margin-top: 6px; text-align: center; }

        /* FULLSKÄRMS CHATT-APP */
        .app-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1001; display: none; flex-direction: column;
            border-radius: 45px; overflow: hidden; padding-bottom: 30px;
        }
        .app-header {
            padding: 55px 24px 15px 24px; font-size: 24px; font-weight: 700;
            color: #fff; border-bottom: 0.5px solid #2c2c2e; display: flex; justify-content: space-between;
        }
        .app-body { flex: 1; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }

        .messages-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 15px; }
        .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg-sender { background: var(--ios-blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .chat-input-bar { display: flex; gap: 8px; padding-top: 10px; }
        .chat-input-bar input { flex: 1; background: var(--ios-dark-gray); border: none; border-radius: 20px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none; -webkit-user-select: text; user-select: text; }
        .chat-send-btn { background: var(--ios-blue); border: none; width: 38px; height: 38px; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Hem-svep */
        .home-bar-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30px;
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 10005; padding-bottom: 8px; cursor: pointer;
        }
        .home-bar { width: 135px; height: 5px; background: rgba(255, 255, 255, 0.95); border-radius: 3px; }

        /* Mobil-anpassning */
        @media (max-width: 600px) {
            .iphone-frame { width: 100vw; height: 100dvh; border-radius: 0; padding: 0; }
            .iphone-screen { border-radius: 0; }
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island-container">
            <div class="dynamic-island" id="island"></div>
        </div>
        
        <div class="iphone-screen">
            <div class="wallpaper-bg"></div>

            <div class="status-bar">
                <span>12:00</span>
                <span>📶 🔋</span>
            </div>

            <div class="home-screen">
                <div class="app-grid">
                    <div class="app-item" onclick="openChat()">
                        <div class="app-icon icon-messages">
                            <div class="message-bubble"></div>
                        </div>
                        <div class="app-label">iMessage</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-screen" id="chatApp">
            <div class="app-header">
                <span>Mina Anteckningar</span>
                <span style="font-size: 14px; color: var(--ios-red); cursor: pointer;" onclick="clearChat()">Rensa allt</span>
            </div>
            <div class="app-body">
                <div class="messages-list" id="msgList">
                    </div>
                <div class="chat-input-bar">
                    <input type="text" id="chatInput" placeholder="Skriv ett privat meddelande..." onkeydown="if(event.key === 'Enter') sendMsg()">
                    <button class="chat-send-btn" onclick="sendMsg()">⬆️</button>
                </div>
            </div>
        </div>

        <div class="home-bar-container" onclick="closeChat()">
            <div class="home-bar"></div>
        </div>
    </div>

    <script>
        // Ladda sparade anteckningar/meddelanden när sidan startas
        document.addEventListener("DOMContentLoaded", loadMessages);

        function sendMsg() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            // Spara lokalt på enheten
            let savedMessages = JSON.parse(localStorage.getItem('private_messages')) || [];
            savedMessages.push(text);
            localStorage.setItem('private_messages', JSON.stringify(savedMessages));

            // Visa i gränssnittet
            renderMessage(text);
            
            input.value = '';
            const list = document.getElementById('msgList');
            list.scrollTop = list.scrollHeight;
        }

        function renderMessage(text) {
            const list = document.getElementById('msgList');
            list.innerHTML += `<div class="msg-bubble msg-sender">${text}</div>`;
        }

        function loadMessages() {
            const list = document.getElementById('msgList');
            let savedMessages = JSON.parse(localStorage.getItem('private_messages')) || [];
            
            if (savedMessages.length === 0) {
                list.innerHTML = `<div class="msg-bubble msg-sender" style="background: var(--ios-dark-gray); align-self: center; border-radius: 18px; font-size: 13px; text-align: center;">Detta är din privata rymd. Allt du skriver här sparas säkert på din egen enhet. 🔒</div>`;
            } else {
                list.innerHTML = '';
                savedMessages.forEach(msg => {
                    renderMessage(msg);
                });
            }
            list.scrollTop = list.scrollHeight;
        }

        function clearChat() {
            if (confirm("Vill du rensa alla dina sparade meddelanden?")) {
                localStorage.removeItem('private_messages');
                loadMessages();
            }
        }

        function openChat() {
            document.getElementById('chatApp').style.display = 'flex';
            loadMessages(); // Ladda om meddelanden när appen öppnas
        }

        function closeChat() {
            document.getElementById('chatApp').style.display = 'none';
        }
    </script>
</body>
</html>
