<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        /* --- 2. SKÄRM-CONTAINERN --- */
        .iphone-screen {
            width: 100%;
            height: 100%;
            max-width: 390px;
            max-height: 844px; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0px 25px 60px rgba(0, 0, 0, 0.8);
            border-radius: 48px;
            transition: all 0.3s ease;
        }
        @media (max-width: 450px) {
            .iphone-screen {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0px;
                box-shadow: none;
            }
        }
        /* --- 3. STATUSFÄLT --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px 10px 28px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000; /* Ligger alltid överst */
            letter-spacing: -0.1px;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }
        .status-left { font-size: 14px; font-weight: 600; }
        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* TÄCKNINGSSTAPLAR */
        .network-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 10px;
        }
        .network-bars span {
            width: 2px;
            background-color: #fff;
            border-radius: 0.5px;
        }
        .bar1 { height: 3px; }
        .bar2 { height: 5px; }
        .bar3 { height: 7px; }
        .bar4 { height: 10px; }
        .wifi-icon {
            width: 15px;
            height: 11px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* iOS-BATTERI */
        .battery-container {
            display: flex;
            align-items: center;
            position: relative;
        }
        .ios-battery {
            width: 25px;
            height: 13px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4.5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 1px;
            position: relative;
        }
        .battery-fill {
            height: 100%;
            width: 88%;
            background-color: #fff;
            border-radius: 2.5px;
            transition: width 0.3s ease;
        }
        .battery-percent-inside {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            font-weight: 800;
            color: #000;
            mix-blend-mode: difference;
            letter-spacing: -0.5px;
            line-height: 1;
            transform: scale(1, 0.95);
        }
        .battery-head {
            width: 1.5px;
            height: 4.5px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 0 1.5px 1.5px 0;
            margin-left: 1px;
        }
        /* --- 4. DYNAMIC ISLAND --- */
        .dynamic-island-container {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            pointer-events: none;
        }
        .dynamic-island {
            width: 120px;
            height: 36px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 35%), #000;
            border: 0.5px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.45), inset 0 0.5px 0 rgba(255,255,255,0.12);
        }
        /* --- 4b. FACE ID-INDIKATOR --- */
        .faceid-indicator {
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translateX(-50%) scale(0.7);
            z-index: 90;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        .faceid-indicator.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .faceid-lock {
            width: 26px; height: 26px;
            fill: none; stroke: #fff; stroke-width: 2.2;
            stroke-linecap: round; stroke-linejoin: round;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.45));
        }
        .faceid-shackle { transition: transform 0.3s ease; transform-origin: 12px 9px; }
        .faceid-indicator.unlocked .faceid-shackle { transform: translateY(-2px) rotate(-15deg); }
        /* --- 5. LÅSSKÄRM --- */
        .lock-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box; z-index: 8;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .lock-screen.unlocked-swipe { transform: translateY(-100%); }
        .lock-content {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px; flex-grow: 1;
            cursor: pointer;
        }
        .date {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .clock {
            font-size: 80px;
            font-weight: 700;
            margin-top: -2px;
            letter-spacing: -2px;
            text-shadow: 0 4px 18px rgba(0,0,0,0.4);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .bottom-container { padding: 20px 32px 40px 32px; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .quick-actions { width: 100%; display: flex; justify-content: space-between; box-sizing: border-box; }
        .action-button {
            width: 50px; height: 50px;
            background: linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 60%), rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border: 0.5px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25), inset 0 0.5px 0 rgba(255,255,255,0.3);
        }
        .action-button svg { width: 20px; height: 20px; fill: #fff; }
        .action-button:active { transform: scale(0.92); background: #ffffff; }
        .action-button:active svg { fill: #1c1c1e; }
        .swipe-area { width: 100%; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .swipe-text { font-size: 13px; font-weight: 500; letter-spacing: 0.3px; opacity: 0.85; animation: pulse 2s infinite; margin-bottom: 8px; }
        .home-bar { width: 134px; height: 5px; background-color: #fff; border-radius: 10px; opacity: 0.95; }
        @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.95; } }
        /* --- 6. HEMSKÄRMEN --- */
        .home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111; background-size: cover; background-position: center;
            z-index: 1; box-sizing: border-box; padding: 70px 25px 30px 25px; 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px 16px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        /* DETALJERAD SQUIRCLE-DESIGN FÖR APPLE IKONER */
        .app-icon {
            width: 60px; height: 60px; 
            border-radius: 13.5px; /* Perfekt iOS Squircle-förhållande */
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; position: relative; overflow: hidden;
        }
        
        /* Premium reflektionslager över ikonerna */
        .app-icon::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        
        .app-icon svg { width: 100%; height: 100%; display: block; }
        .app-item:active .app-icon { transform: scale(0.9); }
        .app-label { font-size: 11px; font-weight: 500; margin-top: 6px; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .dock {
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%), rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(35px) saturate(1.5);
            -webkit-backdrop-filter: blur(35px) saturate(1.5);
            border: 0.5px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 0.5px 0 rgba(255,255,255,0.4);
            margin-bottom: 15px;
        }
        .home-screen-indicator { width: 134px; height: 5px; background-color: #fff; border-radius: 10px; margin: 0 auto; opacity: 0.95; }

        /* --- 7. APP-SKÄRM --- */
        .app-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-sizing: border-box;
            background: #000;
            z-index: 9; /* under statusfältet (1000) & dynamic island (1001) */
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .app-screen.open { display: flex; }
        .app-screen-header {
            padding: 74px 20px 12px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .app-screen-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px 20px 10px 20px;
            box-sizing: border-box;
            color: #fff;
        }
        .app-screen-home {
            padding: 10px 0 16px 0;
            display: flex;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .app-screen-home .home-bar { width: 134px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.9; }

        /* Kamera Specifikt */
        .camera-view { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .camera-viewfinder { 
            flex: 1; 
            border-radius: 14px; 
            background: #000; 
            margin-bottom: 16px; 
            overflow: hidden;
            position: relative;
        }
        .camera-viewfinder video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shutter-row { display: flex; align-items: center; justify-content: center; padding-bottom: 6px; }
        .shutter-btn { width: 68px; height: 68px; border-radius: 50%; background: #fff; border: 4px solid rgba(255,255,255,0.35); cursor: pointer; }
    </style>
</head>
<body>
    <div class="iphone-screen">
        
        <div class="status-bar">
            <span class="status-left" id="statusLeft">Telenor SE</span>
            <div class="status-right">
                <div class="network-bars">
                    <span class="bar1"></span><span class="bar2"></span><span class="bar3"></span><span class="bar4"></span>
                </div>
                <svg class="wifi-icon" viewBox="0 0 16 12">
                    <path d="M1 4.5 C5 1 11 1 15 4.5" />
                    <path d="M3.3 7 C6 4.8 10 4.8 12.7 7" />
                    <circle cx="8" cy="10" r="1.1" fill="#fff" stroke="none" />
                </svg>
                <div class="battery-container">
                    <div class="ios-battery">
                        <div class="battery-fill"></div>
                        <span class="battery-percent-inside">88</span>
                    </div>
                    <div class="battery-head"></div>
                </div>
            </div>
        </div>

        <div class="dynamic-island-container">
            <div class="dynamic-island" id="island"></div>
        </div>

        <div class="faceid-indicator" id="faceIdIndicator">
            <svg class="faceid-lock" id="faceIdLock" viewBox="0 0 24 24">
                <path class="faceid-shackle" d="M7 10V7a5 5 0 0 1 10 0v3" />
                <rect x="5" y="10" width="14" height="11" rx="3.5" fill="#fff" stroke="none" />
            </svg>
        </div>

        <div class="lock-screen" id="lockScreen">
            <div class="lock-content" onclick="simulateFaceID()">
                <div class="date" id="date">Onsdag 15 juli</div>
                <div class="clock" id="clock">12:00</div>
            </div>
            <div class="bottom-container">
                <div class="quick-actions">
                    <div class="action-button" id="flashlight">
                        <svg viewBox="0 0 24 24"><path d="M9 3h6c.6 0 1 .4 1 1v2H8V4c0-.6.4-1 1-1zm6.5 4.5L14 10v9.5c0 .8-.7 1.5-1.5 1.5h-1c-.8 0-1.5-.7-1.5-1.5V10L8.5 7.5h7zM12 11c-.6 0-1 .4-1 1v3c0 .6.4 1 1 1s1-.4 1-1v-3c0-.6-.4-1-1-1z"/></svg>
                    </div>
                    <div class="action-button" id="camera" onclick="openApp('camera')">
                        <svg viewBox="0 0 24 24"><path d="M8.5 5c-.3 0-.6.1-.8.4L7 7H4.5C3.1 7 2 8.1 2 9.5v9C2 19.9 3.1 21 4.5 21h15c1.4 0 2.5-1.1 2.5-2.5v-9C22 8.1 20.9 7 19.5 7H17l-.7-1.6c-.2-.3-.5-.4-.8-.4h-7zM12 18c-2.5 0-4.5-2-4.5-4.5S9.5 9 12 9s4.5 2 4.5 4.5S14.5 18 12 18zm0-1.5c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3 1.3 3 3 3z"/></svg>
                    </div>
                </div>
                <div class="swipe-area" onclick="swipeUpToHome()">
                    <div class="swipe-text">Svep uppåt för att öppna</div>
                    <div class="home-bar"></div>
                </div>
            </div>
        </div>

        <div class="home-screen">
            <div class="app-grid">
                <div class="app-item" onclick="openApp('safari')">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <defs>
                                <linearGradient id="safariBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF"/><stop offset="100%" stop-color="#EAEAEA"/></linearGradient>
                                <linearGradient id="safariGlobe" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0CA6FF"/><stop offset="100%" stop-color="#0055D4"/></linearGradient>
                            </defs>
                            <rect width="60" height="60" fill="url(#safariBg)"/>
                            <circle cx="30" cy="30" r="25" fill="url(#safariGlobe)"/>
                            <circle cx="30" cy="30" r="21" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="1 3"/>
                            <circle cx="30" cy="30" r="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
                            <path d="M30 7 L34 30 L30 35 Z" fill="#FF3B30"/>
                            <path d="M30 53 L26 30 L30 35 Z" fill="#FFFFFF"/>
                            <circle cx="30" cy="30" r="1.5" fill="#CCCCCC"/>
                        </svg>
                    </div>
                    <div class="app-label">Safari</div>
                </div>
                <div class="app-item" onclick="openApp('camera')">
                    <div class="app-icon" style="background: #111;">
                        <svg viewBox="0 0 24 24" style="padding:14px; box-sizing:border-box;"><path fill="#fff" d="M8.5 5c-.3 0-.6.1-.8.4L7 7H4.5C3.1 7 2 8.1 2 9.5v9C2 19.9 3.1 21 4.5 21h15c1.4 0 2.5-1.1 2.5-2.5v-9C22 8.1 20.9 7 19.5 7H17l-.7-1.6c-.2-.3-.5-.4-.8-.4h-7zM12 18c-2.5 0-4.5-2-4.5-4.5S9.5 9 12 9s4.5 2 4.5 4.5S14.5 18 12 18zm0-1.5c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3 1.3 3 3 3z"/></svg>
                    </div>
                    <div class="app-label">Kamera</div>
                </div>
            </div>

            <div class="dock-container">
                <div class="dock">
                    <div class="app-icon" style="width:50px; height:50px; cursor:pointer;" onclick="openApp('phone')">
                        <svg viewBox="0 0 60 60">
                            <defs>
                                <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#43A047"/></linearGradient>
                            </defs>
                            <rect width="60" height="60" fill="url(#phoneBg)"/>
                            <path d="M20 16 C18 16 15 18 15 21 C15 32 28 45 39 45 C42 45 44 42 44 40 L40 35 C39 34 37 34 36 35 L34 37 C29 34 26 31 23 26 L25 24 C26 23 26 21 25 20 L20 16 Z" fill="#FFFFFF"/>
                        </svg>
                    </div>
                    <div class="app-icon" style="width:50px; height:50px; cursor:pointer;" onclick="openApp('messages')">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="url(#phoneBg)"/>
                            <path d="M30 14 C19 14 11 21 11 29 C11 34 14 38 20 41 L18 46 L24 44 C26 45 28 45 30 45 C41 45 49 38 49 29 C49 21 41 14 30 14 Z" fill="#fff"/>
                        </svg>
                    </div>
                </div>
                <div class="home-screen-indicator"></div>
            </div>
        </div>

        <div class="app-screen" id="appScreenGeneric">
            <div class="app-screen-header" id="genericAppHeader">App</div>
            <div class="app-screen-body">
                <p style="text-align: center; opacity: 0.6;">Demo-app. Inte implementerad ännu.</p>
            </div>
            <div class="app-screen-home" onclick="closeApp()">
                <div class="home-bar"></div>
            </div>
        </div>

        <div class="app-screen" id="appScreenCamera">
            <div class="app-screen-header">Kamera</div>
            <div class="app-screen-body" style="padding: 0;">
                <div class="camera-view">
                    <div class="camera-viewfinder">
                        <video id="cameraElement" autoplay playsinline></video>
                    </div>
                    <div class="shutter-row">
                        <button class="shutter-btn" onclick="capturePhoto()"></button>
                    </div>
                </div>
            </div>
            <div class="app-screen-home" onclick="closeApp()">
                <div class="home-bar"></div>
            </div>
        </div>

    </div>

    <script>
        let isLocked = true;
        let isFaceIDSimulated = false;
        let activeStream = null;

        // 1. UPPDATERA KLOCKA & DATUM PÅ RIKTIGT
        function updateClock() {
            const nu = new Date();
            
            // Klocka (HH:MM)
            const timmar = String(nu.getHours()).padStart(2, '0');
            const minuter = String(nu.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${timmar}:${minuter}`;

            // Datum
            const alternativ = { weekday: 'long', day: 'numeric', month: 'long' };
            let datumStr = nu.toLocaleDateString('sv-SE', alternativ);
            // Gör första bokstaven stor (t.ex. "Onsdag 15 juli")
            datumStr = datumStr.charAt(0).toUpperCase() + datumStr.slice(1);
            document.getElementById('date').innerText = datumStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. SIMULERA FACE ID UPPLÅSNING
        function simulateFaceID() {
            if (!isLocked) return;
            const indicator = document.getElementById('faceIdIndicator');
            indicator.classList.add('show');
            
            setTimeout(() => {
                indicator.classList.add('unlocked');
                isLocked = false;
                isFaceIDSimulated = true;
            }, 1000);
        }

        // Automatisk trigger vid klick på låsskärmen
        document.getElementById('lockScreen').addEventListener('click', (e) => {
            if (e.target.closest('.action-button')) return; // ignorera om man klickar på kamera/ficklampa snabbknappar
            simulateFaceID();
        });

        // 3. SVEP UPP / ÖPPNA TELEFONEN
        function swipeUpToHome() {
            if (isLocked) {
                // Försök snabbt köra FaceID om man glömt klicka
                simulateFaceID();
                setTimeout(() => {
                    if(!isLocked) swipeUpToHome();
                }, 1100);
                return;
            }
            document.getElementById('lockScreen').classList.add('unlocked-swipe');
            document.getElementById('faceIdIndicator').classList.remove('show');
        }

        // 4. STARTA FYSISK KAMERA (Detta tvingar den riktiga baksideskameran på telefoner)
        async function startRealCamera() {
            const video = document.getElementById('cameraElement');
            
            // Om kameran redan är igång, stäng inte av den i onödan
            if (activeStream) return; 

            // Vi söker efter den riktiga fysiska kameran (facingMode: environment är bakre kameran)
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" }
                },
                audio: false
            };

            try {
                activeStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = activeStream;
            } catch (err) {
                console.warn("Kunde inte öppna bakre kameran specifikt, provar generell kamera...", err);
                try {
                    // Fallback om baksideskamera saknas (t.ex. på en dator med bara en webbkamera)
                    activeStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = activeStream;
                } catch (fallbackErr) {
                    alert("Kunde inte starta kameran: " + fallbackErr.message);
                }
            }
        }

        // Stäng av kameraströmmarna för att spara ström när appen stängs
        function stopRealCamera() {
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
                activeStream = null;
                document.getElementById('cameraElement').srcObject = null;
            }
        }

        // 5. ÖPPNA APPAR
        function openApp(appName) {
            // Om man öppnar kameran från låsskärmen direkt via snabbknappen
            if (isLocked && appName === 'camera') {
                isLocked = false;
                document.getElementById('lockScreen').classList.add('unlocked-swipe');
                document.getElementById('faceIdIndicator').classList.remove('show');
            }

            if (appName === 'camera') {
                document.getElementById('appScreenCamera').classList.add('open');
                startRealCamera();
            } else {
                document.getElementById('genericAppHeader').innerText = appName.toUpperCase();
                document.getElementById('appScreenGeneric').classList.add('open');
            }
        }

        // STÄNG APP
        function closeApp() {
            document.getElementById('appScreenCamera').classList.remove('open');
            document.getElementById('appScreenGeneric').classList.remove('open');
            stopRealCamera();
        }

        // Ta en bild (simulerat klickljud/blinkning)
        function capturePhoto() {
            const viewfinder = document.querySelector('.camera-viewfinder');
            viewfinder.style.opacity = '0';
            setTimeout(() => {
                viewfinder.style.opacity = '1';
            }, 150);
        }
    </script>
</body>
</html>
