<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING (Mörk bakgrund för desktop) --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 2. DEN SMARTA SKÄRM-CONTAINERN --- */
        .iphone-screen {
            width: 100%;
            height: 100%;
            max-width: 390px;
            max-height: 844px; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0px 25px 60px rgba(0, 0, 0, 0.8);
            border-radius: 48px;
            transition: all 0.3s ease;
        }

        @media (max-width: 450px) {
            .iphone-screen {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0px;
                box-shadow: none;
            }
        }

        /* --- 3. STATUSFÄLT --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px 10px 28px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10;
            letter-spacing: -0.1px;
            pointer-events: none;
        }

        .status-left {
            font-size: 13px;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* TÄCKNINGSSTAPLAR */
        .network-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 10px;
        }
        .network-bars span {
            width: 2px;
            background-color: #fff;
            border-radius: 0.5px;
        }
        .bar1 { height: 3px; }
        .bar2 { height: 5px; }
        .bar3 { height: 7px; }
        .bar4 { height: 10px; }

        /* BATTERI MED PERFEKT INPASSAD PROCENT */
        .battery-container {
            display: flex;
            align-items: center;
        }

        .ios-battery {
            width: 25px;
            height: 12.5px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 4px;
            position: relative;
            padding: 1px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }

        .battery-fill {
            height: 100%;
            width: 88%; 
            background-color: #fff;
            border-radius: 2px;
        }

        /* Finjusterad procent-look för att passa in mycket bättre */
        .battery-percent-inside {
            position: absolute;
            top: 50%;
            left: calc(50% - 1px); /* Centrerad i själva batterikroppen, borträknat piggen */
            transform: translate(-50%, -50%);
            font-size: 7.5px;
            font-weight: 700;
            color: #000;
            z-index: 5;
            letter-spacing: -0.2px;
            line-height: 1;
        }

        .battery-head {
            width: 1.5px;
            height: 4.5px;
            background-color: rgba(255, 255, 255, 0.45);
            position: absolute;
            right: -3px;
            border-radius: 0 1px 1px 0;
        }

        /* --- 4. DYNAMIC ISLAND --- */
        .dynamic-island-container {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .dynamic-island {
            width: 125px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            padding: 0 14px;
            box-sizing: border-box;
        }

        .island-content {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            gap: 10px;
        }

        .island-lock {
            width: 13px;
            height: 13px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .lock-shackle {
            transition: transform 0.3s ease;
            transform-origin: 12px 9px;
        }

        .island-text {
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            width: 0;
            white-space: nowrap;
            transition: opacity 0.2s ease, width 0.2s ease;
        }

        .dynamic-island.expanded {
            width: 170px; 
            height: 34px;
        }

        .dynamic-island.expanded .island-text {
            opacity: 1;
            width: auto;
        }

        .dynamic-island.unlocked .lock-shackle {
            transform: translateY(-2px) rotate(-15px);
        }

        /* LÅSET GÖMS HÄR NÄR UPPLÅST */
        .iphone-screen.is-unlocked .dynamic-island {
            width: 85px;
            padding: 0;
            justify-content: center;
        }
        .iphone-screen.is-unlocked .island-lock {
            display: none;
        }

        /* --- 5. LÅSSKÄRM --- */
        .lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('blackbakgrund.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 8;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .lock-screen.unlocked-swipe {
            transform: translateY(-100%);
        }

        .lock-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px; 
            flex-grow: 1;
        }

        .date {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: -0.2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .clock {
            font-size: 82px;
            font-weight: 900; 
            margin-top: -5px;
            letter-spacing: -4px; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
            transform: scale(1.3, 1.4);
            transform-origin: top center;
        }

        .bottom-container {
            padding: 20px 32px 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .quick-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .action-button {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: none;
        }

        .action-button svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .action-button:active {
            transform: scale(0.92);
            background: #ffffff; 
        }

        .action-button:active svg {
            fill: #1c1c1e; 
        }

        .swipe-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .swipe-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
            animation: pulse 2s infinite;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }

        .home-bar {
            width: 130px;
            height: 5px;
            background-color: #fff;
            border-radius: 10px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* --- 6. HEMSKÄRMEN --- */
        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('blackbakgrund.webp');
            background-size: cover;
            background-position: center;
            z-index: 1;
            box-sizing: border-box;
            padding: 70px 25px 30px 25px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px 16px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .app-icon {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            transition: transform 0.1s;
        }

        .app-item:active .app-icon {
            transform: scale(0.9);
        }

        .app-label {
            font-size: 11px;
            font-weight: 500;
            margin-top: 6px;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .app-safari { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .app-photos { background: #fff; position: relative; overflow: hidden; }
        .app-settings { background: linear-gradient(135deg, #8e9eab, #eef2f3); color: #333; }
        .app-maps { background: linear-gradient(135deg, #56ab2f, #a8e063); }
        .app-appstore { background: linear-gradient(135deg, #1A2980, #26D0CE); }
        .app-mail { background: linear-gradient(135deg, #2980B9, #6DD5FA); }
        .app-notes { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .app-music { background: linear-gradient(135deg, #ff4e50, #f9d423); }

        .dock {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .home-screen-indicator {
            width: 130px;
            height: 5px;
            background-color: #fff;
            border-radius: 10px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="iphone-screen">
        
        <div class="status-bar">
            <span class="status-left">Telenor SE</span>
            <div class="status-right">
                
                <div class="network-bars">
                    <span class="bar1"></span>
                    <span class="bar2"></span>
                    <span class="bar3"></span>
                    <span class="bar4"></span>
                </div>

                <span style="font-size: 11px; font-weight: 800; margin-left: 2px; margin-right: 4px;">5G</span>
                
                <div class="battery-container">
                    <div class="ios-battery">
                        <div class="battery-fill"></div>
                        <span class="battery-percent-inside">88</span>
                        <div class="battery-head"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dynamic-island-container">
            <div class="dynamic-island" id="island" onclick="handleIslandClick()">
                <div class="island-content">
                    <svg class="island-lock" viewBox="0 0 24 24">
                        <path class="lock-shackle" d="M7 10V7a5 5 0 0 1 10 0v3" />
                        <rect x="5" y="10" width="14" height="11" rx="3.5" fill="#fff" stroke="none" />
                    </svg>
                    <span class="island-text" id="islandText">Face ID</span>
                </div>
            </div>
        </div>

        <div class="lock-screen" id="lockScreen">
            <div class="lock-content">
                <div class="date" id="date">Onsdag 15 juli</div>
                <div class="clock" id="clock">12:00</div>
            </div>

            <div class="bottom-container">
                <div class="quick-actions">
                    <div class="action-button" id="flashlight">
                        <svg viewBox="0 0 24 24">
                            <path d="M9 3h6c.6 0 1 .4 1 1v2H8V4c0-.6.4-1 1-1zm6.5 4.5L14 10v9.5c0 .8-.7 1.5-1.5 1.5h-1c-.8 0-1.5-.7-1.5-1.5V10L8.5 7.5h7zM12 11c-.6 0-1 .4-1 1v3c0 .6.4 1 1 1s1-.4 1-1v-3c0-.6-.4-1-1-1z"/>
                        </svg>
                    </div>
                    <div class="action-button" id="camera">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.5 5c-.3 0-.6.1-.8.4L7 7H4.5C3.1 7 2 8.1 2 9.5v9C2 19.9 3.1 21 4.5 21h15c1.4 0 2.5-1.1 2.5-2.5v-9C22 8.1 20.9 7 19.5 7H17l-.7-1.6c-.2-.3-.5-.4-.8-.4h-7zM12 18c-2.5 0-4.5-2-4.5-4.5S9.5 9 12 9s4.5 2 4.5 4.5S14.5 18 12 18zm0-1.5c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3 1.3 3 3 3z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="swipe-area" onclick="swipeUpToHome()">
                    <div class="swipe-text">Svep uppåt för att öppna</div>
                    <div class="home-bar"></div>
                </div>
            </div>
        </div>

        <div class="home-screen">
            <div class="app-grid">
                <div class="app-item">
                    <div class="app-icon app-safari">🧭</div>
                    <div class="app-label">Safari</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-photos">🌸</div>
                    <div class="app-label">Bilder</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-settings">⚙️</div>
                    <div class="app-label">Inställningar</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-maps">🗺️</div>
                    <div class="app-label">Kartor</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-appstore">🅰️</div>
                    <div class="app-label">App Store</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-mail">✉️</div>
                    <div class="app-label">Mejl</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-notes">📝</div>
                    <div class="app-label">Anteckningar</div>
                </div>
                <div class="app-item">
                    <div class="app-icon app-music">🎵</div>
                    <div class="app-label">Musik</div>
                </div>
            </div>

            <div>
                <div class="dock">
                    <div class="app-icon app-safari" style="width:50px; height:50px; font-size:26px;">🧭</div>
                    <div class="app-icon app-mail" style="width:50px; height:50px; font-size:26px;">✉️</div>
                    <div class="app-icon app-music" style="width:50px; height:50px; font-size:26px;">🎵</div>
                    <div class="app-icon app-photos" style="width:50px; height:50px; font-size:26px;">🌸</div>
                </div>
                <div class="home-screen-indicator"></div>
            </div>
        </div>

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('sv-SE', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('date').textContent = dateStr;
        }

        function swipeUpToHome() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.add('unlocked-swipe');
            screen.classList.add('is-unlocked');
        }

        function lockPhone() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.remove('unlocked-swipe');
            screen.classList.remove('is-unlocked');
        }

        let isAnimating = false;
        function handleIslandClick() {
            const screen = document.querySelector('.iphone-screen');
            
            if (screen.classList.contains('is-unlocked')) {
                lockPhone();
                return;
            }

            if (isAnimating) return;
            isAnimating = true;

            const island = document.getElementById('island');
            const islandText = document.getElementById('islandText');

            island.classList.add('expanded');
            islandText.textContent = "Face ID";

            setTimeout(() => {
                island.classList.add('unlocked');
                islandText.textContent = "Upplåst";
            }, 800);

            setTimeout(() => {
                island.classList.remove('expanded');
                setTimeout(() => {
                    island.classList.remove('unlocked');
                    isAnimating = false;
                    swipeUpToHome();
                }, 400);
            }, 2000);
        }

        let startY = 0;
        const lockScreenEl = document.getElementById('lockScreen');

        lockScreenEl.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });

        lockScreenEl.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) {
                swipeUpToHome();
            }
        }, { passive: true });

        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
