<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        /* --- 2. SKÄRM-CONTAINERN --- */
        .iphone-screen {
            width: 100%;
            height: 100%;
            max-width: 390px;
            max-height: 844px; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0px 25px 60px rgba(0, 0, 0, 0.8);
            border-radius: 48px;
            transition: all 0.3s ease;
        }
        @media (max-width: 450px) {
            .iphone-screen {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0px;
                box-shadow: none;
            }
        }
        /* --- 3. STATUSFÄLT --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px 10px 28px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10;
            letter-spacing: -0.1px;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
        }
        .status-left { font-size: 14px; font-weight: 600; }
        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* TÄCKNINGSSTAPLAR */
        .network-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 10px;
        }
        .network-bars span {
            width: 2px;
            background-color: #fff;
            border-radius: 0.5px;
        }
        .bar1 { height: 3px; }
        .bar2 { height: 5px; }
        .bar3 { height: 7px; }
        .bar4 { height: 10px; }
        .wifi-icon {
            width: 15px;
            height: 11px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* iOS-BATTERI */
        .battery-container {
            display: flex;
            align-items: center;
            position: relative;
        }
        .ios-battery {
            width: 25px;
            height: 13px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4.5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 1px;
            position: relative;
        }
        .battery-fill {
            height: 100%;
            width: 88%;
            background-color: #fff;
            border-radius: 2.5px;
            transition: width 0.3s ease;
        }
        .battery-percent-inside {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            font-weight: 800;
            color: #000;
            mix-blend-mode: difference;
            letter-spacing: -0.5px;
            line-height: 1;
            transform: scale(1, 0.95);
        }
        .battery-head {
            width: 1.5px;
            height: 4.5px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 0 1.5px 1.5px 0;
            margin-left: 1px;
        }
        /* --- 4. DYNAMIC ISLAND --- */
        .dynamic-island-container {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
        }
        .dynamic-island {
            width: 120px;
            height: 36px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 35%), #000;
            border: 0.5px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.45), inset 0 0.5px 0 rgba(255,255,255,0.12);
        }
        /* --- 4b. FACE ID-INDIKATOR --- */
        .faceid-indicator {
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translateX(-50%) scale(0.7);
            z-index: 90;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        .faceid-indicator.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .faceid-lock {
            width: 26px; height: 26px;
            fill: none; stroke: #fff; stroke-width: 2.2;
            stroke-linecap: round; stroke-linejoin: round;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.45));
        }
        .faceid-shackle { transition: transform 0.3s ease; transform-origin: 12px 9px; }
        .faceid-indicator.unlocked .faceid-shackle { transform: translateY(-2px) rotate(-15deg); }
        /* --- 5. LÅSSKÄRM --- */
        .lock-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('blackbakgrund.webp');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box; z-index: 8;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .lock-screen.unlocked-swipe { transform: translateY(-100%); }
        .lock-content {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 60px; flex-grow: 1;
            cursor: pointer;
        }
        .date {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .clock {
            font-size: 80px;
            font-weight: 700;
            margin-top: -2px;
            letter-spacing: -2px;
            text-shadow: 0 4px 18px rgba(0,0,0,0.4);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .bottom-container { padding: 20px 32px 40px 32px; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .quick-actions { width: 100%; display: flex; justify-content: space-between; box-sizing: border-box; }
        .action-button {
            width: 50px; height: 50px;
            background: linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 60%), rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border: 0.5px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25), inset 0 0.5px 0 rgba(255,255,255,0.3);
        }
        .action-button svg { width: 20px; height: 20px; fill: #fff; }
        .action-button:active { transform: scale(0.92); background: #ffffff; }
        .action-button:active svg { fill: #1c1c1e; }
        .swipe-area { width: 100%; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .swipe-text { font-size: 13px; font-weight: 500; letter-spacing: 0.3px; opacity: 0.85; animation: pulse 2s infinite; margin-bottom: 8px; }
        .home-bar { width: 134px; height: 5px; background-color: #fff; border-radius: 10px; opacity: 0.95; }
        @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.95; } }
        /* --- 6. HEMSKÄRMEN --- */
        .home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('blackbakgrund.webp'); background-size: cover; background-position: center;
            z-index: 1; box-sizing: border-box; padding: 70px 25px 30px 25px; 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px 16px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        /* DETALJERAD SQUIRCLE-DESIGN FÖR APPLE IKONER */
        .app-icon {
            width: 60px; height: 60px; 
            border-radius: 13.5px; /* Perfekt iOS Squircle-förhållande */
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; position: relative; overflow: hidden;
        }
        
        /* Premium reflektionslager över ikonerna */
        .app-icon::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        
        .app-icon svg { width: 100%; height: 100%; display: block; }
        .app-item:active .app-icon { transform: scale(0.9); }
        .app-label { font-size: 11px; font-weight: 500; margin-top: 6px; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .dock {
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%), rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(35px) saturate(1.5);
            -webkit-backdrop-filter: blur(35px) saturate(1.5);
            border: 0.5px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 0.5px 0 rgba(255,255,255,0.4);
            margin-bottom: 15px;
        }
        .home-screen-indicator { width: 134px; height: 5px; background-color: #fff; border-radius: 10px; margin: 0 auto; opacity: 0.95; }

        /* --- 7. APP-SKÄRM (NYTT: öppna & använda apparna) --- */
        .app-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-sizing: border-box;
            background: #0d0d12;
            z-index: 9; /* under statusfältet (10) & dynamic island (100) -> de förblir synliga ovanpå appen, precis som på riktigt */
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .app-screen.open { display: flex; }
        .app-screen-header {
            padding: 74px 20px 12px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .app-screen-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px 20px 10px 20px;
            box-sizing: border-box;
            color: #fff;
        }
        .app-screen-home {
            padding: 10px 0 16px 0;
            display: flex;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .app-screen-home .home-bar { width: 134px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.9; }

        /* Generiska listrader (Inställningar / Mejl / Meddelanden) */
        .row-group { background: rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .row:last-child { border-bottom: none; }
        .row-icon { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .row-main { flex: 1; min-width: 0; }
        .row-title { font-size: 15px; font-weight: 500; }
        .row-sub { font-size: 12px; opacity: 0.55; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chevron { opacity: 0.35; font-size: 15px; }

        /* Bilder */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .photo-grid div { aspect-ratio: 1; border-radius: 3px; }

        /* Musik */
        .music-art { width: 100%; aspect-ratio: 1; border-radius: 14px; margin: 10px 0 22px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .music-title { font-size: 19px; font-weight: 700; text-align: center; }
        .music-artist { font-size: 14px; opacity: 0.6; text-align: center; margin-bottom: 22px; }
        .music-progress { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-bottom: 24px; position: relative; }
        .music-progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 35%; background: #fff; border-radius: 2px; }
        .music-controls { display: flex; justify-content: center; align-items: center; gap: 36px; }
        .music-side-btn { opacity: 0.8; }
        .music-play-btn {
            width: 62px; height: 62px; border-radius: 50%; background: #fff;
            display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
        }
        .music-play-btn svg { width: 24px; height: 24px; fill: #000; }

        /* Telefon */
        .phone-display { text-align: center; font-size: 34px; font-weight: 300; letter-spacing: 2px; min-height: 44px; margin: 18px 0 10px 0; font-variant-numeric: tabular-nums; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .keypad button {
            aspect-ratio: 1; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.10); color: #fff; font-size: 22px; font-weight: 500;
        }
        .keypad button:active { background: rgba(255,255,255,0.25); }
        .call-btn {
            width: 60px; height: 60px; border-radius: 50%; background: #34C759;
            margin: 22px auto 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Safari */
        .browser-bar { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 9px 14px; font-size: 13px; opacity: 0.65; margin: 8px 0 18px 0; text-align: center; }
        .fake-line { height: 10px; background: rgba(255,255,255,0.15); border-radius: 5px; margin-bottom: 10px; }
        .fake-line.short { width: 55%; }
        .fake-block { height: 110px; border-radius: 10px; margin-bottom: 16px; }

        /* Kartor */
        .map-view {
            width: 100%; height: 340px; border-radius: 14px; position: relative; overflow: hidden;
            background:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 40px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 40px),
                linear-gradient(135deg, #2c3e35, #1c2e28);
        }
        .map-pin {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%);
            width: 26px; height: 26px;
        }
        .map-search { background: rgba(255,255,255,0.12); border-radius: 12px; padding: 10px 14px; font-size: 14px; opacity: 0.7; margin-bottom: 14px; }

        /* App Store */
        .app-card { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .app-card:last-child { border-bottom: none; }
        .app-card-icon { width: 46px; height: 46px; border-radius: 11px; flex-shrink: 0; }
        .app-card-title { font-size: 14px; font-weight: 600; }
        .app-card-sub { font-size: 12px; opacity: 0.55; margin-top: 1px; }
        .app-card-btn { margin-left: auto; background: rgba(255,255,255,0.12); border-radius: 14px; padding: 6px 16px; font-size: 13px; font-weight: 600; }

        /* Videor */
        .video-item { margin-bottom: 18px; }
        .video-thumb { width: 100%; height: 150px; border-radius: 12px; position: relative; margin-bottom: 8px; }
        .video-duration { position: absolute; right: 8px; bottom: 8px; background: rgba(0,0,0,0.7); font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .video-title { font-size: 14px; font-weight: 600; }
        .video-sub { font-size: 12px; opacity: 0.55; margin-top: 2px; }

        /* Kamera */
        .camera-view { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .camera-viewfinder { flex: 1; border-radius: 14px; background: linear-gradient(160deg, #232323, #050505); margin-bottom: 16px; }
        .shutter-row { display: flex; align-items: center; justify-content: center; padding-bottom: 6px; }
        .shutter-btn { width: 68px; height: 68px; border-radius: 50%; background: #fff; border: 4px solid rgba(255,255,255,0.35); cursor: pointer; }

        /* Anteckningar */
        .note-editable {
            min-height: 300px; font-size: 16px; line-height: 1.6; outline: none;
            border-top: 1px solid rgba(255,255,255,0.12); padding-top: 14px;
        }
    </style>
</head>
<body>
    <div class="iphone-screen">
        
        <div class="status-bar">
            <span class="status-left" id="statusLeft">Telenor SE</span>
            <div class="status-right">
                <div class="network-bars">
                    <span class="bar1"></span><span class="bar2"></span><span class="bar3"></span><span class="bar4"></span>
                </div>
                <svg class="wifi-icon" viewBox="0 0 16 12">
                    <path d="M1 4.5 C5 1 11 1 15 4.5" />
                    <path d="M3.3 7 C6 4.8 10 4.8 12.7 7" />
                    <circle cx="8" cy="10" r="1.1" fill="#fff" stroke="none" />
                </svg>
                <div class="battery-container">
                    <div class="ios-battery">
                        <div class="battery-fill"></div>
                        <span class="battery-percent-inside">88</span>
                    </div>
                    <div class="battery-head"></div>
                </div>
            </div>
        </div>
        <div class="dynamic-island-container">
            <div class="dynamic-island" id="island"></div>
        </div>
        <div class="faceid-indicator" id="faceIdIndicator">
            <svg class="faceid-lock" id="faceIdLock" viewBox="0 0 24 24">
                <path class="faceid-shackle" d="M7 10V7a5 5 0 0 1 10 0v3" />
                <rect x="5" y="10" width="14" height="11" rx="3.5" fill="#fff" stroke="none" />
            </svg>
        </div>
        <div class="lock-screen" id="lockScreen">
            <div class="lock-content" onclick="simulateFaceID()">
                <div class="date" id="date">Onsdag 15 juli</div>
                <div class="clock" id="clock">12:00</div>
            </div>
            <div class="bottom-container">
                <div class="quick-actions">
                    <div class="action-button" id="flashlight">
                        <svg viewBox="0 0 24 24"><path d="M9 3h6c.6 0 1 .4 1 1v2H8V4c0-.6.4-1 1-1zm6.5 4.5L14 10v9.5c0 .8-.7 1.5-1.5 1.5h-1c-.8 0-1.5-.7-1.5-1.5V10L8.5 7.5h7zM12 11c-.6 0-1 .4-1 1v3c0 .6.4 1 1 1s1-.4 1-1v-3c0-.6-.4-1-1-1z"/></svg>
                    </div>
                    <div class="action-button" id="camera">
                        <svg viewBox="0 0 24 24"><path d="M8.5 5c-.3 0-.6.1-.8.4L7 7H4.5C3.1 7 2 8.1 2 9.5v9C2 19.9 3.1 21 4.5 21h15c1.4 0 2.5-1.1 2.5-2.5v-9C22 8.1 20.9 7 19.5 7H17l-.7-1.6c-.2-.3-.5-.4-.8-.4h-7zM12 18c-2.5 0-4.5-2-4.5-4.5S9.5 9 12 9s4.5 2 4.5 4.5S14.5 18 12 18zm0-1.5c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3 1.3 3 3 3z"/></svg>
                    </div>
                </div>
                <div class="swipe-area" onclick="swipeUpToHome()">
                    <div class="swipe-text">Svep uppåt för att öppna</div>
                    <div class="home-bar"></div>
                </div>
            </div>
        </div>
        <div class="home-screen">
            <div class="app-grid">
                
                <div class="app-item" onclick="openApp('safari', this)">
                    <div class="app-icon">
                        <svg viewBox="0 0 60 60">
                            <defs>
                                <linearGradient id="safariBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF"/><stop offset="100%" stop-color="#EAEAEA"/></linearGradient>
                                <linearGradient id="safariGlobe" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0CA6FF"/><stop offset="100%" stop-color="#0055D4"/></linearGradient>
                            </defs>
                            <rect width="60" height="60" fill="url(#safariBg)"/>
                            <circle cx="30" cy="30" r="25" fill="url(#safariGlobe)"/>
                            <circle cx="30" cy="30" r="21" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="1 3"/>
                            <circle cx="30" cy="30" r="17" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
                            <path d="M30 7 L34 30 L30 35 Z" fill="#FF3B30"/>
                            <path d="M30 53 L26 30 L30 35 Z" fill="#FFFFFF"/>
                            <circle cx="30" cy="30" r="1.5" fill="#CCCCCC"/>
                        </svg>
                    </div>
                    <div class="app-label">Safari</div>
                </div>
                <div class="app-item" onclick="openApp('photos', this)">
                    <div class="app-icon" style="background: #fff;">
                        <svg viewBox="0 0 60 60">
                            <g transform="translate(30,30)" style="mix-blend-mode: multiply;">
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#FF2A54" opacity="0.85"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#FF9500" opacity="0.85" transform="rotate(45)"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#FFCC00" opacity="0.85" transform="rotate(90)"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#4CD964" opacity="0.85" transform="rotate(135)"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#5AC8FA" opacity="0.85" transform="rotate(180)"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#007AFF" opacity="0.85" transform="rotate(225)"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#5856D6" opacity="0.85" transform="rotate(270)"/>
                                <ellipse cx="0" cy="-11" rx="6.5" ry="11" fill="#A456D6" opacity="0.85" transform="rotate(315)"/>
                            </g>
                        </svg>
                    </div>
                    <div class="app-label">Bilder</div>

    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            const timeStr = `${hours}:${minutes}`;
            document.getElementById('clock').textContent = timeStr;
            const isUnlocked = document.querySelector('.iphone-screen').classList.contains('is-unlocked');
            document.getElementById('statusLeft').textContent = isUnlocked ? timeStr : 'Telenor SE';
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('sv-SE', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('date').textContent = dateStr;
        }
        function swipeUpToHome() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.add('unlocked-swipe');
            screen.classList.add('is-unlocked');
            updateTime();
        }
        function lockPhone() {
            const lockScreen = document.getElementById('lockScreen');
            const screen = document.querySelector('.iphone-screen');
            lockScreen.classList.remove('unlocked-swipe');
            screen.classList.remove('is-unlocked');
            updateTime();
        }
        let faceIdBusy = false;
        function simulateFaceID() {
            const screen = document.querySelector('.iphone-screen');
            if (screen.classList.contains('is-unlocked') || faceIdBusy) return;
            faceIdBusy = true;
            const indicator = document.getElementById('faceIdIndicator');
            indicator.classList.add('show');
            setTimeout(() => {
                indicator.classList.add('unlocked');
            }, 500);
            setTimeout(() => {
                indicator.classList.remove('show');
                setTimeout(() => {
                    indicator.classList.remove('unlocked');
                    faceIdBusy = false;
                }, 300);
            }, 1600);
        }
        let startY = 0;
        const lockScreenEl = document.getElementById('lockScreen');
        lockScreenEl.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });
        lockScreenEl.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) {
                swipeUpToHome();
            }
        }, { passive: true });
        updateTime();
        setInterval(updateTime, 1000);

        function openApp(id, el) {
            const app = apps[id];
            if (!app) return;

            const iconEl = el.classList.contains('app-icon') ? el : el.querySelector('.app-icon');
            const iconRect = iconEl.getBoundingClientRect();
            const stage = document.querySelector('.iphone-screen');
            const stageRect = stage.getBoundingClientRect();

            const scaleX = iconRect.width / stageRect.width;
            const scaleY = iconRect.height / stageRect.height;
            const originX = ((iconRect.left + iconRect.width / 2 - stageRect.left) / stageRect.width) * 100;
            const originY = ((iconRect.top + iconRect.height / 2 - stageRect.top) / stageRect.height) * 100;
            lastOrigin = { originX, originY, scaleX, scaleY };

            appScreenTitle.textContent = app.title;
            appScreenBody.innerHTML = app.body;

            appScreen.style.transition = 'none';
            appScreen.style.transformOrigin = originX + '% ' + originY + '%';
            appScreen.style.transform = `scale(${scaleX}, ${scaleY})`;
            appScreen.style.opacity = '0';
            appScreen.classList.add('open');

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    appScreen.style.transition = 'transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.25s ease';
                    appScreen.style.transform = 'scale(1, 1)';
                    appScreen.style.opacity = '1';
                });
            });
        }

        function closeApp() {
            if (!appScreen.classList.contains('open')) return;
            if (lastOrigin) {
                appScreen.style.transition = 'transform 0.36s cubic-bezier(0.4,0,0.6,1), opacity 0.3s ease';
                appScreen.style.transformOrigin = lastOrigin.originX + '% ' + lastOrigin.originY + '%';
                appScreen.style.transform = `scale(${lastOrigin.scaleX}, ${lastOrigin.scaleY})`;
                appScreen.style.opacity = '0';
            }
            setTimeout(() => {
                appScreen.classList.remove('open');
                appScreen.style.transform = 'scale(1,1)';
                appScreen.style.opacity = '1';
            }, 360);
        }

        // Svep nedåt inuti en app för att stänga den, precis som på riktigt
        let appStartY = 0;
        appScreen.addEventListener('touchstart', (e) => { appStartY = e.touches[0].clientY; }, { passive: true });
        appScreen.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            if (endY - appStartY > 60) closeApp();
        }, { passive: true });

        // Musik: play/paus-knappen fungerar på riktigt
        function toggleMusic(btn) {
            const isPlaying = btn.dataset.playing === 'true';
            btn.dataset.playing = (!isPlaying).toString();
            const icon = btn.querySelector('.play-icon');
            icon.innerHTML = !isPlaying
                ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
                : '<polygon points="6,4 20,12 6,20"/>';
        }

        // Telefon: knappsatsen skriver riktiga siffror
        function dialDigit(d) {
            const display = document.getElementById('phoneDisplay');
            if (!display) return;
            if (d === 'reset') { display.innerHTML = '&nbsp;'; return; }
            if (display.textContent.trim() === '') display.textContent = '';
            if (d === 'backspace') {
                display.textContent = display.textContent.slice(0, -1);
                if (display.textContent === '') display.innerHTML = '&nbsp;';
            } else {
                display.textContent += d;
            }
        }
    </script>
</body>
