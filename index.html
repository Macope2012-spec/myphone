<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Home Screen</title>
    <style>
        /* --- 1. GRUNDLÄGGANDE STYLING --- */
        body {
            background-color: #1e1e24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        /* --- 2. IPHONE-RAMEN --- */
        .iphone {
            width: 375px;
            height: 812px;
            background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=375&auto=format&fit=crop'); /* Färgstark iOS-liknande bakgrund */
            background-size: cover;
            background-position: center;
            border: 12px solid #2d2d30;
            border-radius: 45px;
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Kamerahålet / Dynamic Island */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* --- 3. STATUSBAR (Klocka, Wifi, Batteri) --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 10px 24px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            z-index: 5;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* --- 4. APP-RUTNÄT (HOME SCREEN) --- */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px 15px;
            padding: 60px 20px 20px 20px;
            flex-grow: 1;
            align-content: flex-start;
        }

        /* Enskild app-behållare */
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        /* Själva app-ikonen */
        .app-icon {
            width: 58px;
            height: 58px;
            border-radius: 13px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, filter 0.2s;
        }

        /* Tryck-effekt på apparna */
        .app:active .app-icon {
            transform: scale(0.9);
            filter: brightness(0.8);
        }

        /* App-namnet */
        .app-label {
            color: #fff;
            font-size: 11px;
            margin-top: 6px;
            text-align: center;
            text-shadow: 0px 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* --- 5. DOCKAN LÄNGST NER --- */
        .dock-container {
            padding: 10px 15px 25px 15px;
            position: relative;
        }

        .dock {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Hemknappsstrecket (iOS) */
        .home-bar {
            width: 120px;
            height: 5px;
            background-color: #fff;
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- Ikon-färger (iOS-liknande gradients) --- */
        .safari { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .photos { background: #fff; }
        .camera { background: linear-gradient(135deg, #a1a1a1, #5c5c5c); }
        .messages { background: linear-gradient(135deg, #52c234, #061700); }
        .phone { background: linear-gradient(135deg, #5af770, #22c33a); }
        .music { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .mail { background: linear-gradient(135deg, #2980b9, #2c3e50); }
        .settings { background: linear-gradient(135deg, #bdc3c7, #2c3e50); }
        .appstore { background: linear-gradient(135deg, #00b4db, #0083b0); }
        .maps { background: linear-gradient(135deg, #56ab2f, #a8e063); }
    </style>
</head>
<body>

    <div class="iphone">
        <div class="dynamic-island"></div>

        <div class="status-bar">
            <span id="clock">12:00</span>
            <div class="status-right">
                <span>📶</span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="app-grid">
            
            <div class="app">
                <div class="app-icon photos">🌸</div>
                <div class="app-label">Bilder</div>
            </div>

            <div class="app">
                <div class="app-icon camera">📷</div>
                <div class="app-label">Kamera</div>
            </div>

            <div class="app">
                <div class="app-icon maps">🗺️</div>
                <div class="app-label">Kartor</div>
            </div>

            <div class="app">
                <div class="app-icon mail">✉️</div>
                <div class="app-label">Mail</div>
            </div>

            <div class="app">
                <div class="app-icon settings">⚙️</div>
                <div class="app-label">Inställn.</div>
            </div>

            <div class="app">
                <div class="app-icon appstore">🅰️</div>
                <div class="app-label">App Store</div>
            </div>

        </div>

        <div class="dock-container">
            <div class="dock">
                <div class="app">
                    <div class="app-icon phone">📞</div>
                </div>
                <div class="app">
                    <div class="app-icon safari">🧭</div>
                </div>
                <div class="app">
                    <div class="app-icon messages">💬</div>
                </div>
                <div class="app">
                    <div class="app-icon music">🎵</div>
                </div>
            </div>
            <div class="home-bar"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
