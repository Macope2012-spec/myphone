<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING --- */
        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
        }

        /* --- 2. IPHONE-RAMEN --- */
        .iphone {
            width: 375px;
            height: 812px;
            /* Standard iOS-liknande flytande gradient-bakgrund */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=375&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border: 12px solid #2d2d30;
            border-radius: 45px;
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        /* Dynamic Island (Kamerahålet längst upp) */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* Statusfält (Batteri, Wifi m.m.) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 10px 24px;
            font-size: 13px;
            font-weight: 600;
            z-index: 5;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* --- 3. LÅSSKÄRMENS INNEHÅLL --- */
        .lock-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            flex-grow: 1;
        }

        /* Lås-ikonen */
        .lock-icon {
            font-size: 20px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        /* Datum */
        .date {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Klocka (Stor iOS-stil) */
        .clock {
            font-size: 76px;
            font-weight: 700;
            margin-top: -5px;
            letter-spacing: -1.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.25);
        }

        /* --- 4. VERKTYG & KONTROLLER LÄNGST NER --- */
        .bottom-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: relative;
            z-index: 5;
        }

        /* Snabbknappar (Ficklampa & Kamera) */
        .quick-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .action-button {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Svep-text */
        .swipe-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
            animation: pulse 2s infinite;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* Hem-streck */
        .home-bar {
            width: 120px;
            height: 5px;
            background-color: #fff;
            border-radius: 10px;
            margin-top: 5px;
        }

        /* Animation för pulserande text */
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="iphone">
        <div class="dynamic-island"></div>

        <div class="status-bar">
            <span>Operatör</span>
            <div class="status-right">
                <span>📶</span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="lock-content">
            <div class="lock-icon">🔒</div>
            <div class="date" id="date">Onsdag 15 juli</div>
            <div class="clock" id="clock">12:00</div>
        </div>

        <div class="bottom-container">
            <div class="quick-actions">
                <div class="action-button">🔦</div>
                <div class="action-button">📷</div>
            </div>
            
            <div class="swipe-text">Svep uppåt för att öppna</div>
            <div class="home-bar"></div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Uppdatera klockan (HH:MM)
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            // Uppdatera datumet på svenska
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('sv-SE', options);
            // Gör första bokstaven i veckodagen till stor bokstav
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('date').textContent = dateStr;
        }

        // Kör direkt och uppdatera sedan varje sekund
        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
