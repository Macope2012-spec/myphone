<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Lock Screen</title>
    <style>
        /* --- 1. GRUNDSTYLING --- */
        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
        }

        /* --- 2. IPHONE-RAMEN --- */
        .iphone {
            width: 375px;
            height: 812px;
            /* Din iOS 17 bakgrundsbild */
            background-image: url('ios-17-wallpaper-v2-light-4k.jpg');
            background-size: cover;
            background-position: center;
            border: 12px solid #2d2d30;
            border-radius: 45px;
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        /* Dynamic Island (Kamerahålet längst upp) */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* Statusfält (Batteri, Wifi m.m.) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 10px 24px;
            font-size: 13px;
            font-weight: 600;
            z-index: 5;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* --- 3. LÅSSKÄRMENS INNEHÅLL --- */
        .lock-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            flex-grow: 1;
        }

        /* Lås-ikonen */
        .lock-icon {
            font-size: 20px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        /* Datum */
        .date {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Klocka (Stor iOS-stil) */
        .clock {
            font-size: 76px;
            font-weight: 700;
            margin-top: -5px;
            letter-spacing: -1.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.25);
        }

        /* --- 4. VERKTYG & KONTROLLER LÄNGST NER --- */
        .bottom-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: relative;
            z-index: 5;
        }

        /* Snabbknappar (Ficklampa & Kamera) */
        .quick-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .action-button {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* SVG-ikoner inuti knapparna */
        .action-button svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .action-button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.25);
        }

        /* Svep-text */
        .swipe-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
            animation: pulse 2s infinite;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* Hem-streck */
        .home-bar {
            width: 120px;
            height: 5px;
            background-color: #fff;
            border-radius: 10px;
            margin-top: 5px;
        }

        /* Animation för pulserande text */
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="iphone">
        <div class="dynamic-island"></div>

        <div class="status-bar">
            <span>Operatör</span>
            <div class="status-right">
                <span>📶</span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="lock-content">
            <div class="lock-icon">🔒</div>
            <div class="date" id="date">Onsdag 15 juli</div>
            <div class="clock" id="clock">12:00</div>
        </div>

        <div class="bottom-container">
            <div class="quick-actions">
                
                <div class="action-button" id="flashlight">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 2h6v4H9z" opacity="0.3"/>
                        <path d="M12 14a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
                        <path fill-rule="evenodd" d="M16.5 6.5h-9a.5.5 0 0 0-.5.5v3a3.5 3.5 0 0 0 1 2.4V21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-8.6a3.5 3.5 0 0 0 1-2.4V7a.5.5 0 0 0-.5-.5ZM8.5 8h7v1.5h-7V8Zm0 3v.5a2 2 0 0 0 .57 1.41L10 13.83V20.5h4v-6.67l.93-.92A2 2 0 0 0 15.5 11.5V11h-7Z" clip-rule="evenodd"/>
                    </svg>
                </div>

                <div class="action-button" id="camera">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" d="M8.5 4.5A1.5 1.5 0 0 1 10 3h4a1.5 1.5 0 0 1 1.5 1.5v.5h3A2.5 2.5 0 0 1 21 7.5v10a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-10A2.5 2.5 0 0 1 5.5 5h3v-.5ZM5.5 6.5h13a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-13a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1Z" clip-rule="evenodd"/>
                        <path d="M12 15.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                        <path fill-rule="evenodd" d="M12 17a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0-1.5a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z" clip-rule="evenodd"/>
                        <circle cx="17.25" cy="9.25" r="0.75" />
                    </svg>
                </div>

            </div>
            
            <div class="swipe-text">Svep uppåt för att öppna</div>
            <div class="home-bar"></div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Uppdatera klockan (HH:MM)
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            // Uppdatera datumet på svenska
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('sv-SE', options);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('date').textContent = dateStr;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
